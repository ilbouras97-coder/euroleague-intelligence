name: Refresh EuroLeague Data

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Force refresh every selected season
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      availability_only:
        description: Refresh only injury/availability files
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "30 6 * * *"

permissions:
  contents: write

concurrency:
  group: euroleague-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh data
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event.inputs.full_refresh }}" == "true" ]]; then
            args+=(--full-refresh)
          fi
          if [[ "${{ github.event.inputs.availability_only }}" == "true" ]]; then
            args+=(--availability-only)
          fi
          python scripts/refresh_data.py "${args[@]}"

      - name: Commit refreshed outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data assets/player_photos
          if git diff --cached --quiet; then
            echo "No refreshed data changes to commit."
            exit 0
          fi
          git commit -m "Refresh EuroLeague data"
          git push
